bundle:
  name: qualite-eau-pipeline

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://dbc-88bdf080-3e51.cloud.databricks.com

resources:
  jobs:
    qualite_eau_pipeline:
      name: qualite_eau_pipeline
      schedule:
        quartz_cron_expression: "0 0 2 * * ?"
        timezone_id: Europe/Paris
        pause_status: PAUSED

      tasks:
        - task_key: bronze
          notebook_task:
            notebook_path: ./notebooks/01_Bronze_Ingestion.ipynb

        - task_key: silver
          depends_on:
            - task_key: bronze
          notebook_task:
            notebook_path: ./notebooks/02_Silver_Transformation.ipynb

        - task_key: quality
          depends_on:
            - task_key: silver
          notebook_task:
            notebook_path: ./notebooks/04_Quality_Checks.ipynb

        - task_key: gold
          depends_on:
            - task_key: quality
          notebook_task:
            notebook_path: ./notebooks/03_Gold_Aggregations.ipynb